<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <!-- Title & Description(SEO) -->
    <title>Frontend Mentor | Pricing Component With Toggle</title>
    <meta name="description" content="Solution to Pricing Component with toggle challenge on Frontend Mentor.">

    <!-- CSS main styles -->
    <link rel="stylesheet" href="./css/main.css">

    <!-- JS script -->
    <script src="./js/app.js" defer></script>
</head>

<body>

    <main class="main">

        <section class="plans">

            <div class="container">
                <h1 class="plans__title">Our Pricing</h1>

                <div class="toggle-container">

                    <span class="toggle-label" id="yearly-label">Annually</span>

                    <label class="switch">
                        <input type="checkbox" id="price-toggle" aria-labelledby="yearly-label monthly-label">
                        <span class="slider round"></span>
                    </label>

                    <span class="toggle-label" id="monthly-label">Monthly</span>

                </div>

                <div class="plans__cards" id="cards"></div>

            </div>

        </section>
    </main>




    <footer class="footer">
        <div class="attribution">
            Challenge by <a class="attribution__link" href="https://www.frontendmentor.io?ref=challenge"
                target="_blank">Frontend Mentor</a>.
            Coded by <a class="attribution__link" href="https://github.com/amansgz" target="_blank">@amansgz</a>.
        </div>
    </footer>

</body>

</html>
